<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 신문 - 디지털 아카이브</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 리셋 및 폰트 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nanum Myeongjo', serif;
            background-color: #fcfbfa;
            color: #111;
            line-height: 1.6;
        }
        .sans-font { font-family: 'Noto Sans KR', sans-serif; }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* 신문 헤더 */
        .newspaper-header {
            text-align: center;
            border-bottom: 5px double #111;
            margin-bottom: 30px;
            padding-bottom: 20px;
        }
        .newspaper-header h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 15px;
            margin: 10px 0;
        }
        .header-meta {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #111;
            border-bottom: 1px solid #111;
            padding: 8px 10px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        /* 카테고리 탭 */
        .category-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .category-btn {
            font-family: inherit;
            background: transparent;
            border: 1px solid #111;
            padding: 8px 25px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .category-btn:hover, .category-btn.active {
            background-color: #111;
            color: #fff;
        }

        /* 메인 레이아웃 */
        .container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* 뷰어 영역 */
        .viewer-section { flex: 2.5; }
        .viewer-header {
            border-bottom: 3px solid #111;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .viewer-title { font-size: 1.8rem; font-weight: 800; }
        .pdf-frame {
            width: 100%;
            height: 80vh;
            border: 1px solid #ccc;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
            background-color: #fff;
        }
        #pdf-viewer { width: 100%; height: 100%; border: none; }

        /* 아카이브 리스트 영역 */
        .archive-section {
            flex: 1;
            border-left: 1px solid #ddd;
            padding-left: 30px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .archive-section::-webkit-scrollbar { width: 6px; }
        .archive-section::-webkit-scrollbar-thumb { background: #bbb; border-radius: 3px; }
        .archive-title {
            font-size: 1.4rem;
            font-weight: 800;
            border-bottom: 2px solid #111;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* 리스트 아이템 디자인 */
        .issue-list { display: flex; flex-direction: column; gap: 15px; }
        .issue-card {
            padding: 15px;
            border: 1px solid #eee;
            background-color: #fff;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }
        .issue-card::before {
            content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background-color: transparent; transition: 0.2s;
        }
        .issue-card:hover { transform: translateX(-5px); border-color: #111; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .issue-card.active { border-color: #111; background-color: #faf9f6; }
        .issue-card.active::before { background-color: #111; }

        .issue-vol { font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; display: block; color: #b30000; }
        .issue-date { color: #555; font-size: 0.9rem; font-family: 'Noto Sans KR', sans-serif; }

        /* 상태 메시지 */
        #status-msg { text-align: center; padding: 50px; font-weight: bold; color: #666; font-family: 'Noto Sans KR', sans-serif; }

        /* 반응형 */
        @media (max-width: 992px) {
            .container { flex-direction: column; }
            .viewer-section, .archive-section { width: 100%; }
            .archive-section { border-left: none; padding-left: 0; border-top: 1px solid #ddd; padding-top: 30px; max-height: none; }
            .newspaper-header h1 { font-size: 3rem; letter-spacing: 5px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header class="newspaper-header">
            <div class="header-meta">
                <span id="top-vol" class="sans-font">Vol. --</span>
                <span class="sans-font">DIGITAL ARCHIVE</span>
                <span id="top-date" class="sans-font">--</span>
            </div>
            <h1>학교 신문</h1>
        </header>

        <nav class="category-nav" id="category-bar">
            </nav>

        <main class="container">
            <section class="viewer-section">
                <div class="viewer-header">
                    <h2 class="viewer-title" id="current-title">신문 데이터를 불러오는 중입니다...</h2>
                </div>
                <div id="status-msg">GitHub에서 파일을 찾고 있습니다...<br>(저장소 이름과 아이디 설정을 확인해주세요)</div>
                <div class="pdf-frame" id="pdf-container" style="display: none;">
                    <iframe id="pdf-viewer" src="" title="학교 신문 뷰어"></iframe>
                </div>
            </section>

            <aside class="archive-section">
                <h3 class="archive-title">📂 지난 호 보기</h3>
                <div class="issue-list" id="issue-list">
                    </div>
            </aside>
        </main>
    </div>

    <script>
        /* =========================================================================
           [필수 수정 영역] 본인의 GitHub 환경에 맞게 아래 두 줄의 값을 반드시 수정하세요!
           ========================================================================= */
        const GITHUB_USERNAME = '본인_깃허브_아이디_입력'; // 예: 'honggildong'
        const GITHUB_REPO = '본인_저장소_이름_입력';     // 예: 'school-newspaper'
        const FOLDER_PATH = 'pdfs';                  // 이 부분은 그대로 두세요.

        const API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${FOLDER_PATH}`;

        let allIssues = [];
        let currentFilter = 'all';

        // DOM 요소 캐싱
        const elStatus = document.getElementById('status-msg');
        const elPdfContainer = document.getElementById('pdf-container');
        const elPdfViewer = document.getElementById('pdf-viewer');
        const elCurrentTitle = document.getElementById('current-title');
        const elIssueList = document.getElementById('issue-list');
        const elCategoryBar = document.getElementById('category-bar');

        // 1. GitHub API로 파일 목록 불러오기 및 파싱
        async function fetchNewspapers() {
            // 만약 설정을 안 바꿨을 경우의 경고 메시지
            if (GITHUB_USERNAME === '본인_깃허브_아이디_입력' || GITHUB_REPO === '본인_저장소_이름_입력') {
                elStatus.innerHTML = "<span style='color:red;'>[오류] HTML 파일 하단의 GITHUB_USERNAME과 GITHUB_REPO를 본인의 깃허브 정보로 수정해주세요!</span>";
                return;
            }

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('파일을 찾을 수 없습니다. (pdfs 폴더가 없거나 이름이 틀렸을 수 있습니다.)');
                
                const files = await response.json();
                const parsedFiles = [];

                // 정규식: YY_MM_DD.pdf (예: 26_06_08.pdf)
                const regex = /^(\d{2})_(\d{2})_(\d{2})\.pdf$/i;

                files.forEach(file => {
                    const match = file.name.match(regex);
                    if (match) {
                        const yy = match[1];
                        const mm = match[2];
                        const dd = match[3];
                        
                        const fullYear = `20${yy}`;
                        const formattedDate = `${fullYear}년 ${mm}월 ${dd}일`;
                        const dateValue = new Date(`${fullYear}-${mm}-${dd}`).getTime();

                        parsedFiles.push({
                            fileName: file.name,
                            url: file.download_url,
                            year: fullYear,
                            formattedDate: formattedDate,
                            dateValue: dateValue
                        });
                    }
                });

                if (parsedFiles.length === 0) {
                    elStatus.textContent = "pdfs 폴더 안에 규칙(YY_MM_DD.pdf)에 맞는 파일이 없습니다.";
                    return;
                }

                // 2. 호수 자동 계산 로직
                // 오래된 순(오름차순)으로 정렬하여 제1호부터 차례대로 번호 부여
                parsedFiles.sort((a, b) => a.dateValue - b.dateValue);
                parsedFiles.forEach((issue, index) => {
                    issue.issueNumber = index + 1;
                });

                // 사용자에게 보여줄 때는 최신호가 맨 위로 오도록 내림차순 재정렬
                parsedFiles.sort((a, b) => b.dateValue - a.dateValue);
                allIssues = parsedFiles;

                // UI 업데이트
                elStatus.style.display = 'none';
                elPdfContainer.style.display = 'block';

                renderCategories();
                renderIssueList(allIssues);
                
                // 첫 번째(가장 최신) 신문을 메인 뷰어에 띄움
                if (allIssues.length > 0) loadIssue(allIssues[0]);

            } catch (error) {
                elStatus.textContent = `오류 발생: ${error.message}`;
            }
        }

        // 3. 연도별 카테고리 탭 생성
        function renderCategories() {
            const years = [...new Set(allIssues.map(issue => issue.year))].sort((a, b) => b - a);
            
            elCategoryBar.innerHTML = `<button class="category-btn active" onclick="filterByYear('all')">전체보기</button>`;
            
            years.forEach(year => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.textContent = `${year}년`;
                btn.onclick = () => filterByYear(year);
                elCategoryBar.appendChild(btn);
            });
        }

        // 카테고리 필터링 기능
        function filterByYear(year) {
            currentFilter = year;

            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const filteredIssues = year === 'all' ? allIssues : allIssues.filter(issue => issue.year === year);
            renderIssueList(filteredIssues);

            if (filteredIssues.length > 0) {
                loadIssue(filteredIssues[0]);
                const firstCard = elIssueList.querySelector('.issue-card');
                if (firstCard) firstCard.classList.add('active');
            }
        }

        // 4. 호수별 리스트 렌더링
        function renderIssueList(issuesToRender) {
            elIssueList.innerHTML = '';

            if (issuesToRender.length === 0) {
                elIssueList.innerHTML = '<p style="color:#666;">신문이 없습니다.</p>';
                return;
            }

            issuesToRender.forEach(issue => {
                const card = document.createElement('div');
                card.className = `issue-card ${elPdfViewer.src === issue.url ? 'active' : ''}`;
                
                card.innerHTML = `
                    <span class="issue-vol">제 ${issue.issueNumber} 호</span>
                    <span class="issue-date">${issue.formattedDate} 발행</span>
                `;

                card.addEventListener('click', () => {
                    loadIssue(issue);
                    document.querySelectorAll('.issue-card').forEach(el => el.classList.remove('active'));
                    card.classList.add('active');
                });

                elIssueList.appendChild(card);
            });
            
            if (elIssueList.firstChild && currentFilter === 'all' && !elIssueList.querySelector('.active')) {
                elIssueList.firstChild.classList.add('active');
            }
        }

        // 5. 선택한 신문 뷰어에 표시
        function loadIssue(issue) {
            elPdfViewer.src = issue.url;
            elCurrentTitle.textContent = `제 ${issue.issueNumber} 호`;
            document.getElementById('top-vol').textContent = `Vol. ${issue.issueNumber}`;
            document.getElementById('top-date').textContent = issue.formattedDate;
        }

        // 스크립트 구동
        document.addEventListener('DOMContentLoaded', fetchNewspapers);
    </script>
</body>
</html>
